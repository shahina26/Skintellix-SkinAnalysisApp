version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: skintellix_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: skintellix
      MONGO_INITDB_ROOT_PASSWORD: skintellix_secure_2024
      MONGO_INITDB_DATABASE: skintellix
    volumes:
      - mongodb_data:/data/db
    networks:
      - skintellix_network

  # ── Redis ────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: skintellix_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - skintellix_network

  # ── Backend API ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skintellix_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://skintellix:skintellix_secure_2024@mongodb:27017/skintellix?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: skintellix_jwt_secret_change_in_production_2024
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - skintellix_network

  # ── Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skintellix_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - skintellix_network

volumes:
  mongodb_data:
  redis_data:

networks:
  skintellix_network:
    driver: bridge
